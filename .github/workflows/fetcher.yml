name: Crypto Fetcher Cron

on:
  schedule:
    # Se ejecuta cada 15 minutos
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde el botón en GitHub

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout del código
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Ejecutar Fetcher
        id: fetcher
        shell: bash
        env:
          # Aquí conectamos los secretos de GitHub con las variables que espera tu script
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -o pipefail
          python -m app.fetcher 2>&1 | tee fetcher.log

      - name: Subir log del fetcher
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: fetcher-log-${{ github.run_id }}
          path: fetcher.log
          if-no-files-found: warn
          retention-days: 14

      - name: Notificar fallo en GitHub
        if: ${{ failure() }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = 'Fetcher cron failure';
            const body = [
              'El workflow del fetcher falló.',
              '',
              `- Workflow: ${context.workflow}`,
              `- Job: ${context.job}`,
              `- Branch: ${context.ref}`,
              `- Commit: ${context.sha}`,
              `- Evento: ${context.eventName}`,
              `- Run: ${runUrl}`,
              '',
              'Revisa el artifact `fetcher-log-*` para ver el log completo.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'fetcher-failure',
              per_page: 10,
            });

            const existing = issues.find(issue => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['fetcher-failure', 'automated'],
              });
            }
